# trialspine on Fly.io — demo backend for cognitive-task sessions
app = "trialspine"
primary_region = "sjc"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8080"
  TMB_REPO_PATH = "/tmb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "45s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    [http_service.checks.headers]
      Host = "trialspine.fly.dev"
      X-Forwarded-Proto = "https"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  strategy = "rolling"
  wait_timeout = "10m"
